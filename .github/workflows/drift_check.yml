name: Daily drift check

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install evidently==0.4.33 pandas scikit-learn

      - name: Run drift check
        run: python src/run_drift.py

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-report-${{ github.run_id }}
          path: reports/drift_report.html
